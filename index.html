<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christian Tobin - Interactive Portfolio</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.playcanvas.com/playcanvas-stable.min.js"></script>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-content">
      <h1>Loading Experience...</h1>
      <div class="loading-bar">
        <div class="loading-progress" id="loading-progress"></div>
      </div>
      <p id="loading-text">Initializing...</p>
    </div>
  </div>

  <div id="info-overlay">
    <div class="controls-hint">
      <p><strong>Controls:</strong> W/S = Accelerate/Brake | A/D = Turn Left/Right | Mouse Drag = Camera | Scroll = Zoom | Click Billboards for Info</p>
    </div>
  </div>

  <canvas id="application-canvas"></canvas>

  <script src="scene.js"></script>
</body>
</html>
